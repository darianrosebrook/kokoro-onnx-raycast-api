invariants:
  - All MLX inference runs on a single executor worker (max_workers=1)
  - asyncio event loop never blocks on MLX inference for >100ms
  - TTFA (Time to First Audio) ≤500ms for streaming requests
  - API stays responsive (health checks return) during long generations
  - Test suite proves single-worker serialization via thread-name capture
acceptance:
  - id: A1
    given: A streaming TTS request is in flight on the MLX worker
    when: A second concurrent request arrives
    then: It serializes on the same worker; no AGX SIGABRT; both responses complete
  - id: A2
    given: A long blocking TTS request (response_format=wav) is generating
    when: A /health request arrives
    then: /health returns 200 within 100ms, not waiting for generation
  - id: A3
    given: The MLX serialization is in place
    when: Eight concurrent generate_audio calls run from a ThreadPoolExecutor
    then: All eight execute on a single 'mlx*' thread with active_count never >1
  - id: A4
    given: A developer runs scripts/check_environment.py
    when: kokoro-mlx is installed and MLX is importable on Apple Silicon
    then: >-
      The script reports ready without listing onnxruntime/kokoro-onnx as
      required
acceptance_criteria: []
non_functional:
  a11y: []
  perf:
    asyncio_unblocked_p95_ms: 100
    ttfa_streaming_p95_ms: 500
  security: []
contracts:
  - type: project_setup
    path: .caws/specs/TTS-002.yaml
    description: >-

type: fix
status: active
risk_tier: 3
mode: chore
blast_radius:
  modules:
    - api/
    - tests/
    - scripts/
    - raycast/
  data_migration: false
  external_apis: false
operational_rollback_slo: 5m
scope:
  in:
    - api/
    - tests/unit/test_tts.py
    - tests/unit/test_api_endpoints.py
    - scripts/check_environment.py
    - raycast/package.json
    - raycast/src/utils/tts/tts-processor.ts
    - raycast/src/utils/tts/streaming/audio-streamer.ts
